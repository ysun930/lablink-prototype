<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>LabLink Results</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 20px;
      background-color: #f5f7fb;
      color: #222;
    }

    h1 {
      color: #1f4e99;
    }

    #sort-select {
      margin: 10px 0 25px;
      padding: 8px;
    }

    .lab-card {
      background-color: white;
      border: 1px solid #d9dfe8;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .score-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 15px 0;
    }

    .score-badge {
      min-width: 150px;
      padding: 10px 14px;
      background-color: #eef3fb;
      border-radius: 6px;
    }

    .semantic-score {
      background-color: #f0e8ff;
    }

    .match-reason {
      margin: 18px 0;
      padding: 14px;
      background-color: #faf7ff;
      border-left: 4px solid #7048a8;
    }

    .profile-link {
      display: inline-block;
      padding: 9px 14px;
      background-color: #1f4e99;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .profile-link:hover {
      background-color: #163b75;
    }

    .form-link {
      display: inline-block;
      margin-bottom: 15px;
    }

    .ai-note {
      margin-top: 16px;
      color: #555;
    }

    footer {
      margin-top: 40px;
      padding: 15px;
      text-align: center;
      color: #555;
      border-top: 1px solid #ccc;
    }
  </style>
</head>

<body>
  <h1>LabLink Match Results</h1>

  <p>
    <a class="form-link" href="index.html">
      Return to Candidate Form
    </a>
  </p>

  <label for="sort-select">
    Sort results by:
  </label>

  <select id="sort-select">
    <option value="combinedPercent">
      Combined Score
    </option>

    <option value="rulePercent">
      Rule-Based Score
    </option>

    <option value="semanticPercent">
      AI Semantic Score
    </option>
  </select>

  <div id="results-container"></div>

  <footer>
    <p>
      Semantic matching powered by Cohere Embed AI.
    </p>
  </footer>

  <script>
    // Read results saved by app.js
    const storedResults =
      sessionStorage.getItem(
        "labMatchResults"
      );

    let results = [];

    if (storedResults) {
      try {
        const parsedResults =
          JSON.parse(storedResults);

        results = Array.isArray(parsedResults)
          ? parsedResults
          : [];
      } catch (error) {
        console.error(
          "Could not parse labMatchResults:",
          error
        );
      }
    }

    const container =
      document.getElementById(
        "results-container"
      );

    const sortSelect =
      document.getElementById(
        "sort-select"
      );

    // Safely formats a percentage
    function safePercent(value) {
      const number = Number(value);

      return Number.isFinite(number)
        ? number.toFixed(1)
        : "0.0";
    }

    // Converts arrays into readable text
    function formatList(value) {
      if (Array.isArray(value)) {
        return value.join(", ");
      }

      return value || "Not available";
    }

    // Prevents data values from being interpreted as HTML
    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // Displays all lab cards
    function displayResults(
      sortBy = "combinedPercent"
    ) {
      container.innerHTML = "";

      if (results.length === 0) {
        container.innerHTML = `
          <p>
            No results found. Please submit
            the candidate form first.
          </p>

          <p>
            <a href="index.html">
              Go to Candidate Form
            </a>
          </p>
        `;

        sortSelect.disabled = true;
        return;
      }

      // Sort a copy from highest score to lowest
      const sortedResults =
        [...results].sort(
          (a, b) =>
            Number(b[sortBy] || 0) -
            Number(a[sortBy] || 0)
        );

      sortedResults.forEach(
        (result, index) => {
          const card =
            document.createElement(
              "section"
            );

          card.className =
            "lab-card";

          const profile =
            result.labProfile || {};

          const labId =
            result.Lab_ID ||
            "Unknown Lab";

          const labName =
            result.Lab_Name ||
            "Unnamed Lab";

          const semanticReason =
            result.semanticReason ||
            "Semantic explanation is not available.";

          card.innerHTML = `
            <h2>
              Rank ${index + 1}:
              ${escapeHtml(labId)} —
              ${escapeHtml(labName)}
            </h2>

            <div class="score-badges">
              <div class="score-badge">
                <strong>
                  Combined Match
                </strong>

                <br>

                ${safePercent(
                  result.combinedPercent
                )}%
              </div>

              <div class="score-badge">
                <strong>
                  Rule-Based Score
                </strong>

                <br>

                ${safePercent(
                  result.rulePercent
                )}%
              </div>

              <div class="score-badge semantic-score">
                <strong>
                  AI Semantic Score
                </strong>

                <br>

                ${safePercent(
                  result.semanticPercent
                )}%
              </div>
            </div>

            <div class="match-reason">
              <h3>Why this match?</h3>

              <p>
                ${escapeHtml(semanticReason)}
              </p>
            </div>

            <div class="score-breakdown">
              <h3>
                Rule-Based Score Breakdown
              </h3>

              <p>
                <strong>Field Score:</strong>

                ${safePercent(
                  result.fieldPercent
                )}%
              </p>

              <p>
                <strong>Technique Score:</strong>

                ${safePercent(
                  result.techniquePercent
                )}%
              </p>

              <p>
                <strong>Goal Score:</strong>

                ${safePercent(
                  result.goalPercent
                )}%
              </p>
            </div>

            <div class="lab-information">
              <h3>Lab Information</h3>

              <p>
                <strong>Primary Field:</strong>

                ${escapeHtml(
                  profile.Primary_Field ||
                  "Not available"
                )}
              </p>

              <p>
                <strong>Sub-disciplines:</strong>

                ${escapeHtml(
                  formatList(
                    profile.Sub_discipline
                  )
                )}
              </p>

              <p>
                <strong>Lab Aim:</strong>

                ${escapeHtml(
                  profile.Lab_Aim ||
                  "Not available"
                )}
              </p>

              <p>
                <strong>Institution Type:</strong>

                ${escapeHtml(
                  profile.Institution_Type ||
                  "Not available"
                )}
              </p>

              <p>
                <strong>Required Techniques:</strong>

                ${escapeHtml(
                  profile.Required_Techniques ||
                  formatList(
                    profile.Required_Skills
                  )
                )}
              </p>

              <p>
                <strong>Lab Description:</strong>

                ${escapeHtml(
                  profile
                    .Lab_Description_FreeText ||
                  "Not available"
                )}
              </p>
            </div>

            <p>
              <a
                class="profile-link"
                href="lab-profile.html?labId=${encodeURIComponent(
                  labId
                )}"
              >
                View Lab Profile
              </a>
            </p>

            <p class="ai-note">
              <small>
                The final combined score uses
                80% rule-based scoring and
                20% Cohere semantic scoring.
              </small>
            </p>
          `;

          container.appendChild(card);
        }
      );
    }

    // Re-sort when the dropdown changes
    sortSelect.addEventListener(
      "change",
      event => {
        displayResults(
          event.target.value
        );
      }
    );

    // Initially sort by combined score
    displayResults();
  </script>
</body>
</html>
