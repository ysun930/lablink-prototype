<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>LabLink Match Results</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f7fb;
      color: #222;
    }

    header {
      padding: 18px 30px;
      background-color: #123f88;
      color: white;
    }

    header h1 {
      max-width: 1000px;
      margin: auto;
    }

    main {
      max-width: 1000px;
      margin: auto;
      padding: 30px 20px;
    }

    .top-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      margin-bottom: 25px;
    }

    .back-link {
      color: #123f88;
      font-weight: bold;
      text-decoration: none;
    }

    select {
      padding: 8px;
      border: 1px solid #aaa;
      border-radius: 5px;
    }

    .lab-card {
      margin-bottom: 22px;
      padding: 22px;
      background-color: white;
      border: 1px solid #d9dfe8;
      border-radius: 9px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.04);
    }

    .lab-card h2 {
      margin-top: 0;
      color: #123f88;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 18px 0;
    }

    .score-box {
      padding: 13px;
      background-color: #eef3fb;
      border-radius: 6px;
      text-align: center;
    }

    .score-box strong {
      display: block;
      margin-bottom: 5px;
    }

    .match-reason {
      margin: 18px 0;
      padding: 15px;
      background-color: #faf7ff;
      border-left: 4px solid #7048a8;
    }

    .breakdown {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 15px 0;
    }

    .breakdown div {
      padding: 10px;
      background-color: #f7f8fa;
      border-radius: 5px;
    }

    .profile-link {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background-color: #123f88;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      text-align: center;
      color: #555;
      border-top: 1px solid #ccc;
    }

    @media (max-width: 700px) {
      .score-grid,
      .breakdown {
        grid-template-columns: 1fr;
      }

      .top-controls {
        display: block;
      }

      .top-controls div {
        margin-top: 15px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>LabLink Match Results</h1>
  </header>

  <main>
    <div class="top-controls">
      <a class="back-link" href="index.html">
        ← Return to Candidate Form
      </a>

      <div>
        <label for="sort-select">
          Sort by:
        </label>

        <select id="sort-select">
          <option value="combinedPercent">
            Combined Score
          </option>

          <option value="rulePercent">
            Rule-Based Score
          </option>

          <option value="semanticPercent">
            AI Semantic Score
          </option>
        </select>
      </div>
    </div>

    <h2 id="candidate-heading"></h2>

    <div id="results-container"></div>
  </main>

  <footer>
    <p>
      Semantic matching powered by Cohere Embed AI.
    </p>
  </footer>

  <script>
    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function safePercent(value) {
      const number = Number(value);

      return Number.isFinite(number)
        ? number.toFixed(1)
        : "0.0";
    }

    function formatList(value) {
      if (Array.isArray(value)) {
        return value.join(", ");
      }

      return value || "Not available";
    }

    function readStoredJson(key, fallback) {
      try {
        const stored =
          sessionStorage.getItem(key);

        return stored
          ? JSON.parse(stored)
          : fallback;
      } catch (error) {
        console.error(
          `Could not read ${key}:`,
          error
        );

        return fallback;
      }
    }

    const results =
      readStoredJson(
        "labMatchResults",
        []
      );

    const candidate =
      readStoredJson(
        "submittedCandidate",
        {}
      );

    const container =
      document.getElementById(
        "results-container"
      );

    const sortSelect =
      document.getElementById(
        "sort-select"
      );

    const heading =
      document.getElementById(
        "candidate-heading"
      );

    heading.textContent =
      candidate.Candidate_Name
        ? `Matches for ${candidate.Candidate_Name}`
        : "Your Laboratory Matches";

    function displayResults(
      sortBy = "combinedPercent"
    ) {
      container.innerHTML = "";

      if (!Array.isArray(results) ||
          results.length === 0) {
        container.innerHTML = `
          <p>
            No match results were found.
          </p>

          <p>
            <a href="index.html">
              Complete the candidate form
            </a>
          </p>
        `;

        sortSelect.disabled = true;
        return;
      }

      const sortedResults =
        [...results].sort(
          (a, b) =>
            Number(b[sortBy] || 0) -
            Number(a[sortBy] || 0)
        );

      sortedResults.forEach(
        (result, index) => {
          const profile =
            result.labProfile || {};

          const card =
            document.createElement(
              "section"
            );

          card.className = "lab-card";

          card.innerHTML = `
            <h2>
              Rank ${index + 1}:
              ${escapeHtml(result.Lab_ID)}
              —
              ${escapeHtml(result.Lab_Name)}
            </h2>

            <div class="score-grid">
              <div class="score-box">
                <strong>Combined Match</strong>
                ${safePercent(
                  result.combinedPercent
                )}%
              </div>

              <div class="score-box">
                <strong>Rule-Based Score</strong>
                ${safePercent(
                  result.rulePercent
                )}%
              </div>

              <div class="score-box">
                <strong>AI Semantic Score</strong>
                ${safePercent(
                  result.semanticPercent
                )}%
              </div>
            </div>

            <div class="match-reason">
              <h3>Why this match?</h3>

              <p>
                ${escapeHtml(
                  result.semanticReason ||
                  "Semantic explanation is unavailable."
                )}
              </p>
            </div>

            <h3>Rule-Based Breakdown</h3>

            <div class="breakdown">
              <div>
                <strong>Field:</strong>
                ${safePercent(
                  result.fieldPercent
                )}%
              </div>

              <div>
                <strong>Techniques:</strong>
                ${safePercent(
                  result.techniquePercent
                )}%
              </div>

              <div>
                <strong>Goals:</strong>
                ${safePercent(
                  result.goalPercent
                )}%
              </div>
            </div>

            <h3>Lab Information</h3>

            <p>
              <strong>Primary Field:</strong>
              ${escapeHtml(
                profile.Primary_Field ||
                "Not available"
              )}
            </p>

            <p>
              <strong>Sub-disciplines:</strong>
              ${escapeHtml(
                formatList(
                  profile.Sub_discipline
                )
              )}
            </p>

            <p>
              <strong>Lab Aim:</strong>
              ${escapeHtml(
                profile.Lab_Aim ||
                "Not available"
              )}
            </p>

            <p>
              <strong>Description:</strong>
              ${escapeHtml(
                profile.Lab_Description_FreeText ||
                "Not available"
              )}
            </p>

            <a
              class="profile-link"
              href="lab-profile.html?labId=${encodeURIComponent(
                result.Lab_ID
              )}"
            >
              View Lab Profile
            </a>
          `;

          container.appendChild(card);
        }
      );
    }

    sortSelect.addEventListener(
      "change",
      event => {
        displayResults(
          event.target.value
        );
      }
    );

    displayResults();
  </script>
</body>
</html>
