<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LabLink Results</title>
</head>

<body>
  <h1>LabLink Match Results</h1>

  <label for="sort-select">Sort results by:</label>

  <select id="sort-select">
    <option value="combinedPercent">Combined Score</option>
    <option value="rulePercent">Rule-Based Score</option>
    <option value="semanticPercent">AI Semantic Score</option>
  </select>

  <div id="results-container"></div>

  <script>
    // Must match the key used in app.js
    const storedResults = sessionStorage.getItem("lablinkResults");

    const results = storedResults
      ? JSON.parse(storedResults)
      : [];

    const container = document.getElementById("results-container");
    const sortSelect = document.getElementById("sort-select");

    // Display all ranked lab cards
    function displayResults(sortBy = "combinedPercent") {
      container.innerHTML = "";

      if (results.length === 0) {
        container.innerHTML =
          "<p>No results found. Please submit the candidate form first.</p>";
        return;
      }

      // Sort highest score to lowest score
      results.sort((a, b) => b[sortBy] - a[sortBy]);

      results.forEach((result, index) => {
        const card = document.createElement("div");

        card.className = "lab-card";

        card.innerHTML = `
          <h2>
            Rank ${index + 1}: ${result.Lab_ID} — ${result.Lab_Name}
          </h2>

          <p>
            <strong>Combined Match:</strong>
            ${result.combinedPercent.toFixed(1)}%
          </p>

          <p>
            <strong>Rule-Based Score:</strong>
            ${result.rulePercent.toFixed(1)}%
          </p>

          <p>
            <strong>AI Semantic Score:</strong>
            ${result.semanticPercent.toFixed(1)}%
          </p>

          <p>
            AI semantic similarity was generated using Cohere embeddings.
          </p>

          <hr>
        `;

        container.appendChild(card);
      });
    }

    // Re-sort cards whenever the dropdown changes
    sortSelect.addEventListener("change", event => {
      displayResults(event.target.value);
    });

    // Initially display results by combined score
    displayResults();
  </script>
</body>
</html>
