<!DOCTYPE html>
<html>
<head>
  <title>LabLink Candidate Form</title>
</head>
<body>
  <h1>LabLink Candidate Form</h1>

  <form id="candidate-form">
    <label>Name:</label>
    <input id="candidate-name" type="text"><br><br>

    <label>Primary Field:</label>
    <input id="primary-field" type="text"><br><br>

    <label>Sub-discipline:</label>
    <input id="sub-discipline" type="text"><br><br>

    <label>Skills:</label>
    <input id="skills" type="text"><br><br>

    <label>Career Goal:</label>
    <input id="career-goal" type="text"><br><br>

    <label>Education Level:</label>
    <input id="education-level" type="text"><br><br>

    <label>Hours Available:</label>
    <input id="hours-available" type="text"><br><br>

    <label>Compensation Need:</label>
    <input id="compensation-need" type="text"><br><br>

    <label>Remote Preference:</label>
    <input id="remote-preference" type="text"><br><br>

    <label>Research Statement:</label><br>
    <textarea id="research-statement"></textarea><br><br>

    <button type="submit">Find Matches</button>
  </form>

  <script src="../scripts/config.js"></script>
  <script src="../scripts/app.js"></script>
</body>
</html>
