<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>LabLink Lab Profile</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f7fb;
      color: #222;
    }

    header {
      padding: 18px 30px;
      background-color: #123f88;
      color: white;
    }

    header h1 {
      max-width: 900px;
      margin: auto;
    }

    main {
      max-width: 900px;
      margin: auto;
      padding: 30px 20px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #123f88;
      font-weight: bold;
      text-decoration: none;
    }

    .profile-card {
      padding: 28px;
      background-color: white;
      border: 1px solid #d9dfe8;
      border-radius: 10px;
    }

    .profile-card h2 {
      margin-top: 0;
      color: #123f88;
    }

    .score-section {
      margin: 22px 0;
      padding: 18px;
      background-color: #eef3fb;
      border-radius: 8px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .score-box {
      padding: 12px;
      background-color: white;
      border-radius: 6px;
      text-align: center;
    }

    .score-box strong {
      display: block;
      margin-bottom: 5px;
    }

    .details p {
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
      line-height: 1.5;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      text-align: center;
      color: #555;
      border-top: 1px solid #ccc;
    }

    @media (max-width: 650px) {
      .score-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>LabLink Lab Profile</h1>
  </header>

  <main>
    <a class="back-link" href="results.html">
      ← Return to Match Results
    </a>

    <article
      id="profile-card"
      class="profile-card"
    >
      <p>Loading laboratory profile...</p>
    </article>
  </main>

  <footer>
    <p>
      Semantic matching powered by Cohere Embed AI.
    </p>
  </footer>

  <script>
    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function safePercent(value) {
      const number = Number(value);

      return Number.isFinite(number)
        ? number.toFixed(1)
        : "0.0";
    }

    function formatList(value) {
      if (Array.isArray(value)) {
        return value.join(", ");
      }

      return value || "Not available";
    }

    function readStoredResults() {
      try {
        return JSON.parse(
          sessionStorage.getItem(
            "labMatchResults"
          ) || "[]"
        );
      } catch (error) {
        console.error(
          "Could not read match results:",
          error
        );

        return [];
      }
    }

    function getLabId(raw) {
      return (
        raw["Lab_ID (LAB-001 to LAB-005)"] ||
        raw.Lab_ID ||
        ""
      );
    }

    function renderProfile(
      profile,
      result = null
    ) {
      const card =
        document.getElementById(
          "profile-card"
        );

      const scoreSection = result
        ? `
          <section class="score-section">
            <h3>
              Match Scores for the Current Candidate
            </h3>

            <div class="score-grid">
              <div class="score-box">
                <strong>Combined</strong>
                ${safePercent(
                  result.combinedPercent
                )}%
              </div>

              <div class="score-box">
                <strong>Rule-Based</strong>
                ${safePercent(
                  result.rulePercent
                )}%
              </div>

              <div class="score-box">
                <strong>AI Semantic</strong>
                ${safePercent(
                  result.semanticPercent
                )}%
              </div>
            </div>

            <p>
              <strong>Why this match?</strong>
              ${escapeHtml(
                result.semanticReason ||
                "Semantic explanation is unavailable."
              )}
            </p>
          </section>
        `
        : "";

      card.innerHTML = `
        <h2>
          ${escapeHtml(
            profile.Lab_Name ||
            "Unnamed Laboratory"
          )}
        </h2>

        <p>
          <strong>Lab ID:</strong>
          ${escapeHtml(
            profile.Lab_ID ||
            getLabId(profile)
          )}
        </p>

        ${scoreSection}

        <section class="details">
          <p>
            <strong>Primary Field:</strong>
            ${escapeHtml(
              profile.Primary_Field ||
              "Not available"
            )}
          </p>

          <p>
            <strong>Sub-disciplines:</strong>
            ${escapeHtml(
              formatList(
                profile.Sub_discipline ||
                profile.Sub_disciplines
              )
            )}
          </p>

          <p>
            <strong>Lab Aim:</strong>
            ${escapeHtml(
              profile.Lab_Aim ||
              "Not available"
            )}
          </p>

          <p>
            <strong>Required Techniques:</strong>
            ${escapeHtml(
              profile.Required_Techniques ||
              formatList(
                profile.Required_Skills
              )
            )}
          </p>

          <p>
            <strong>Preferred Techniques:</strong>
            ${escapeHtml(
              profile.Preferred_Techniques ||
              "Not available"
            )}
          </p>

          <p>
            <strong>Career Pathways:</strong>
            ${escapeHtml(
              profile.Career_Pathways_Supported ||
              "Not available"
            )}
          </p>

          <p>
            <strong>Hiring Level:</strong>
            ${escapeHtml(
              profile.Hiree_Level_Sought ||
              "Not available"
            )}
          </p>

          <p>
            <strong>Hours:</strong>
            ${escapeHtml(
              profile.Hours_Per_Week ||
              profile.Hours ||
              "Not available"
            )}
          </p>

          <p>
            <strong>Compensation:</strong>
            ${escapeHtml(
              profile.Compensation_Original ||
              profile.Compensation ||
              "Not available"
            )}
          </p>

          <p>
            <strong>Remote Option:</strong>
            ${escapeHtml(
              profile.Remote_Option ||
              profile.Remote ||
              "Not available"
            )}
          </p>

          <p>
            <strong>Institution Type:</strong>
            ${escapeHtml(
              profile.Institution_Type ||
              "Not available"
            )}
          </p>

          <p>
            <strong>Lab Description:</strong>
            ${escapeHtml(
              profile.Lab_Description_FreeText ||
              "Not available"
            )}
          </p>
        </section>
      `;
    }

    async function loadProfile() {
      const parameters =
        new URLSearchParams(
          window.location.search
        );

      const labId =
        parameters.get("labId");

      const card =
        document.getElementById(
          "profile-card"
        );

      if (!labId) {
        card.innerHTML =
          "<p>No laboratory was selected.</p>";
        return;
      }

      const results =
        readStoredResults();

      const selectedResult =
        results.find(
          result =>
            result.Lab_ID === labId
        );

      if (selectedResult) {
        renderProfile(
          selectedResult.labProfile || {},
          selectedResult
        );

        return;
      }

      try {
        const response =
          await fetch("../data/labs.json");

        if (!response.ok) {
          throw new Error(
            `Could not load labs.json: ${response.status}`
          );
        }

        const labs =
          await response.json();

        const rawLab =
          labs.find(
            lab =>
              getLabId(lab) === labId
          );

        if (!rawLab) {
          card.innerHTML =
            "<p>Laboratory not found.</p>";
          return;
        }

        renderProfile(rawLab);
      } catch (error) {
        console.error(
          "Could not load lab profile:",
          error
        );

        card.innerHTML =
          "<p>The laboratory profile could not be loaded.</p>";
      }
    }

    loadProfile();
  </script>
</body>
</html>
